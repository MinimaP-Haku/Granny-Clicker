name: Build Windows EXE (NW.js concat)

on:
  push:
    branches: [windows]
  workflow_dispatch:

env:
  NWJS_VERSION: "v0.70.0"    # ustaw swoją wersję NW.js
  ARCH: "win64"             # win32 lub win64

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"

      - name: Install npm deps (if you have build step)
        run: npm ci

      - name: Create package.nw (zip of project files)
        shell: powershell
        run: |
          Remove-Item -Force -ErrorAction SilentlyContinue .\package.nw
          # include package.json, index.html and web/ folder; exclude big assets if you want them external
          $files = @("package.json","index.html")
          Get-ChildItem -Path .\web -Recurse | ForEach-Object { $files += $_.FullName }
          Compress-Archive -Path $files -DestinationPath .\package.nw

      - name: Download NW.js runtime
        shell: powershell
        run: |
          $v = "${{ env.NWJS_VERSION }}"
          $arch = "${{ env.ARCH }}"
          $url = "https://dl.nwjs.io/$v/nwjs-$v-win-$arch.zip"
          Invoke-WebRequest -Uri $url -OutFile nw.zip
          Expand-Archive -Path nw.zip -DestinationPath nw_runtime

      - name: Build GrannyClicker.exe (concat)
        shell: cmd
        run: |
          cd nw_runtime\nwjs-*
          cd $PSScriptRoot\nw_runtime\nwjs-*
          copy /b nw.exe+..\..\package.nw ..\GrannyClicker.exe
        # depending on runner the path may need minor tweaks

      - name: Set icon (optional, requires rcedit.exe in repo or download)
        if: ${{ secrets.WINDOWS_RCEDIT != '' }}
        shell: cmd
        run: |
          REM expects rcedit.exe at .\build\rcedit.exe or set secret to path
          .\build\rcedit.exe ..\GrannyClicker.exe --set-icon .\build\icon.ico

      - name: Code sign (optional)
        if: ${{ secrets.SIGN_PFX }}
        shell: cmd
        run: |
          REM This requires CERT PFX in secrets and signtool available on runner
          echo "%SIGN_PFX%" > cert.pfx
          signtool sign /f cert.pfx /p "%{ { secrets.SIGN_PFX_PASSWORD } }" /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 ..\GrannyClicker.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GrannyClicker-win
          path: ..\GrannyClicker.exe
